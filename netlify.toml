# ============================================================================
# Legacy WordPress URLs — the site used to run on WordPress. Google still
# crawls many old paths and lists them as "Crawled but not indexed" or 404.
# 410 Gone tells Google to drop them from the index faster than a 404.
# ============================================================================

# WordPress core/admin paths
[[redirects]]
  from = "/wp-admin/*"
  to = "/"
  status = 410
  force = true

[[redirects]]
  from = "/wp-content/*"
  to = "/"
  status = 410
  force = true

[[redirects]]
  from = "/wp-includes/*"
  to = "/"
  status = 410
  force = true

[[redirects]]
  from = "/wp-json/*"
  to = "/"
  status = 410
  force = true

[[redirects]]
  from = "/xmlrpc.php"
  to = "/"
  status = 410
  force = true

[[redirects]]
  from = "/wp-login.php"
  to = "/"
  status = 410
  force = true

[[redirects]]
  from = "/wp-signup.php"
  to = "/"
  status = 410
  force = true

# WordPress feeds, comments, trackbacks
[[redirects]]
  from = "/feed"
  to = "/"
  status = 410
  force = true

[[redirects]]
  from = "/feed/"
  to = "/"
  status = 410
  force = true

[[redirects]]
  from = "/*/feed/"
  to = "/"
  status = 410
  force = true

[[redirects]]
  from = "/comments/feed/"
  to = "/"
  status = 410
  force = true

[[redirects]]
  from = "/trackback/"
  to = "/"
  status = 410
  force = true

[[redirects]]
  from = "/*/trackback/"
  to = "/"
  status = 410
  force = true

# WordPress archive pages — collapse to relevant section
[[redirects]]
  from = "/author/norbert/*"
  to = "/about.html"
  status = 301
  force = true

[[redirects]]
  from = "/author/*"
  to = "/about.html"
  status = 301
  force = true

[[redirects]]
  from = "/category/*"
  to = "/gallery.html"
  status = 301
  force = true

[[redirects]]
  from = "/tag/*"
  to = "/gallery.html"
  status = 301
  force = true

# WordPress date-based archives (e.g. /2024/05/12/)
[[redirects]]
  from = "/20*"
  to = "/"
  status = 301
  force = true

