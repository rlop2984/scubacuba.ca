# Netlify config — ScubaCuba.ca
# Static site, no build step. Publish directory is `prototype/`.

[build]
  publish = "prototype"

# Security & caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Long cache for static assets (CSS/JS/images) — cache-busted via ?v=
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Short cache for HTML (so updates roll out fast)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Short cache for sitemap & robots so search engines see fresh updates
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/plain; charset=utf-8"

# ============================================================================
# Pretty URLs — 301 redirect bare paths to the canonical .html versions
# so Google indexes ONE URL per page.
# ============================================================================
[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 301
  force = true

[[redirects]]
  from = "/diving-centers"
  to = "/diving-centers.html"
  status = 301
  force = true

[[redirects]]
  from = "/trips"
  to = "/upcoming-trips.html"
  status = 301
  force = true

[[redirects]]
  from = "/upcoming-trips"
  to = "/upcoming-trips.html"
  status = 301
  force = true

[[redirects]]
  from = "/gallery"
  to = "/gallery.html"
  status = 301
  force = true

[[redirects]]
  from = "/quote"
  to = "/quote.html"
  status = 301
