# ============================================================================
# Legacy WordPress URLs — the site used to run on WordPress. Google still
# crawls many old paths and lists them as "Crawled but not indexed" or 404.
# 410 Gone tells Google to drop them from the index faster than a 404.
# ============================================================================

# WordPress core/admin paths
[[redirects]]
  from = "/wp-admin/*"
